<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login — Inflanar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-form-side">
      <h1 class="auth-title">Login</h1>
      <p class="auth-sub">Welcome to Inflanar</p>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab(this)">Client</button>
        <button class="auth-tab" onclick="switchTab(this)">Influencer</button>
      </div>
      <form onsubmit="handleLogin(event)">
        <label class="auth-label">Email*</label>
        <input type="email" class="auth-input" id="l-email" placeholder="Email" required>
        <label class="auth-label">Password*</label>
        <input type="password" class="auth-input" id="l-pw" placeholder="Password" required>
        <div class="auth-row">
          <label><input type="checkbox"> Remember Me</label>
          <a href="forgot-password.html" class="auth-forgot">Forgot Password?</a>
        </div>
        <button type="submit" class="auth-submit" id="login-btn">Log In</button>
        <div class="auth-divider">OR</div>
        <button type="button" class="auth-social-btn">G Sign In with Google</button>
        <button type="button" class="auth-social-btn">f Sign In with Facebook</button>
      </form>
      <div class="auth-footer">Don't have an account? <a href="register.html">Create Account</a></div>
    </div>
    <div>
      <img class="auth-visual-img" src="assets/img/misc/auth-illustration.jpg" alt="Login"
        onerror="this.src='https://placehold.co/400x380/c8b8f5/6C3AFF?text=Login+Illustration'">
    </div>
  </div>
</div>
<div id="cta-placeholder"></div>
<div id="footer-placeholder"></div>
<script src="data/data.js"></script><script src="js/main.js"></script>
<script>
function switchTab(el){document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active')}
function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('login-btn');
  btn.textContent='Logging in...'; btn.disabled=true;
  setTimeout(()=>{btn.textContent='✓ Success!';setTimeout(()=>{btn.textContent='Log In';btn.disabled=false;},2000);},1000);
}
</script>
</body>
</html>
