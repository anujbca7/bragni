<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>About Us — Inflanar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<div id="page-hero-placeholder"></div>

<!-- FEATURES -->
<section class="features-section section">
  <div class="container">
    <div class="tc reveal">
      <div class="sec-label" id="feat-label"></div>
      <h2 class="sec-title" id="feat-title"></h2>
      <div class="sec-divider"></div>
    </div>
    <div class="feature-grid" id="feature-grid"></div>
  </div>
</section>

<!-- ABOUT SPLIT -->
<section class="section" style="background:var(--white)">
  <div class="container">
    <div class="about-split">
      <div class="about-img-wrap reveal-left">
        <img src="assets/img/misc/about-img.jpg" alt="About"
          onerror="this.src='https://placehold.co/520x390/c8b8f5/6C3AFF?text=About+Inflanar'">
      </div>
      <div class="reveal-right">
        <div class="sec-label" style="justify-content:flex-start" id="about-label"></div>
        <h2 class="sec-title" id="about-title"></h2>
        <div class="sec-divider"></div>
        <p style="font-size:14.5px;color:var(--text-light);line-height:1.85;margin-bottom:12px" id="about-desc1"></p>
        <p style="font-size:14.5px;color:var(--text-light);line-height:1.85;margin-bottom:24px" id="about-desc2"></p>
        <a href="contact.html" class="btn btn-pink" style="padding:12px 32px;margin-bottom:24px">Contact Us</a>
        <div class="about-ceo">
          <img class="about-ceo-avatar" src="assets/img/misc/ceo-avatar.jpg" alt="CEO"
            onerror="this.src='https://placehold.co/52x52/c8b8f5/6C3AFF?text=CEO'">
          <div>
            <div class="about-ceo-name" id="ceo-name"></div>
            <div class="about-ceo-role" id="ceo-role"></div>
            <img class="about-signature" src="assets/img/misc/ceo-signature.jpg" alt="Signature"
              onerror="this.style.display='none'">
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- HOW IT WORKS -->
<section class="steps-section section">
  <div class="container">
    <div class="tc reveal">
      <div class="sec-label" id="how-label"></div>
      <h2 class="sec-title" id="how-title"></h2>
      <div class="sec-divider"></div>
    </div>
    <div class="steps-grid" id="steps-grid"></div>
  </div>
</section>

<!-- BRAND PARTNERS -->
<section class="partners-section section" style="background:var(--white)">
  <div class="container">
    <div class="partners-inner">
      <div class="reveal-left">
        <div class="sec-label" style="justify-content:flex-start">Our Partners</div>
        <h2 class="sec-title" id="partners-title"></h2>
        <p class="sec-sub" style="margin-bottom:24px" id="partners-desc"></p>
        <a href="contact.html" class="btn btn-primary" style="padding:12px 32px">Contact Us</a>
      </div>
      <div class="reveal-right">
        <div class="partners-logos" id="partners-logos"></div>
      </div>
    </div>
  </div>
</section>

<!-- SOCIAL STATS -->
<div class="stats-strip">
  <div class="container">
    <div class="stats-grid" id="stats-grid"></div>
  </div>
</div>

<!-- TESTIMONIALS -->
<section class="section" style="background:var(--white)">
  <div class="container">
    <div class="tc reveal">
      <div class="sec-label" id="testi-label"></div>
      <h2 class="sec-title" id="testi-title"></h2>
      <div class="sec-divider"></div>
    </div>
    <div class="testi-slider-wrap">
      <div class="testi-grid" id="testi-grid"></div>
      <div class="testi-dots" id="testi-dots"></div>
    </div>
  </div>
</section>

<div id="cta-placeholder"></div>
<div id="footer-placeholder"></div>
<script src="data/data.js"></script><script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  renderPageHero('About Us', [{label:'Home',href:'index.html'},{label:'About Us',href:'#'}]);
  const f=INFLANAR.features_section,a=INFLANAR.about_section,h=INFLANAR.how_section,p=INFLANAR.partners_section;
  document.getElementById('feat-label').textContent=f.label;
  document.getElementById('feat-title').textContent=f.title;
  document.getElementById('feature-grid').innerHTML=INFLANAR.features.map((ft,i)=>`
    <div class="feature-card reveal" style="transition-delay:${i*.1}s">
      <div class="feature-card-icon">${ft.icon}</div>
      <div class="feature-card-title">${ft.title}</div>
      <div class="feature-card-desc">${ft.desc}</div>
    </div>`).join('');
  document.getElementById('about-label').textContent=a.label;
  document.getElementById('about-title').textContent=a.title;
  document.getElementById('about-desc1').textContent=a.desc1;
  document.getElementById('about-desc2').textContent=a.desc2;
  document.getElementById('ceo-name').textContent=a.ceo_name;
  document.getElementById('ceo-role').textContent=a.ceo_role;
  document.getElementById('how-label').textContent=h.label;
  document.getElementById('how-title').textContent=h.title;
  document.getElementById('steps-grid').innerHTML=INFLANAR.steps.map((s,i)=>`
    <div class="step-card reveal" style="transition-delay:${i*.1}s">
      <div class="step-num">${s.num}</div>
      <img class="step-img" src="${s.img}" alt="${s.title}"
        onerror="this.src='https://placehold.co/280x158/F5F3FF/6C3AFF?text=Step+${s.num}'">
      <div class="step-title">${s.title}</div>
      <div class="step-desc">${s.desc}</div>
    </div>`).join('');
  document.getElementById('partners-title').textContent=p.title;
  document.getElementById('partners-desc').textContent=p.desc;
  document.getElementById('partners-logos').innerHTML=INFLANAR.partners.map(pt=>`
    <div class="partner-logo"><img src="${pt.img}" alt="${pt.name}"
      onerror="this.outerHTML='<span class=partner-logo-text>${pt.name}</span>'"></div>`).join('');
  document.getElementById('stats-grid').innerHTML=INFLANAR.social_stats.map((s,i)=>`
    <div class="stat-box">
      <div class="stat-icon">${['🔵','🐦','🎵','📷'][i]}</div>
      <div><div class="stat-val">${s.count}</div><div class="stat-platform">${s.platform} Followers</div></div>
    </div>`).join('');
  document.getElementById('testi-label').textContent=INFLANAR.testi_section.label;
  document.getElementById('testi-title').textContent=INFLANAR.testi_section.title;
  document.getElementById('testi-grid').innerHTML=INFLANAR.testimonials.slice(0,2).map(t=>`
    <div class="testi-card reveal">
      <div class="testi-card-top">
        <div class="testi-company">${t.company}</div>
        <div class="testi-quote">"</div>
      </div>
      <div class="testi-text">${t.text}</div>
      <div class="testi-author">
        <img class="testi-avatar" src="${t.avatar}" alt="${t.name}"
          onerror="this.src='https://placehold.co/42x42/c8b8f5/6C3AFF?text=A'">
        <div><div class="testi-name">${t.name}</div><div class="testi-role">${t.role}</div></div>
      </div>
    </div>`).join('');
  setTimeout(initReveal,80);
});
</script>
</body>
</html>
