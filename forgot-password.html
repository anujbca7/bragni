<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Forgot Password — Inflanar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-form-side">
      <p style="font-size:14px;color:var(--text-mid);line-height:1.7;margin-bottom:22px">Did you forget your password? Dont worry. Please submit below form using your email, and get a reset password link.</p>
      <form onsubmit="handleReset(event)">
        <label class="auth-label">Email*</label>
        <input type="email" class="auth-input" id="fp-email" placeholder="Email" required>
        <button type="submit" class="auth-submit" id="fp-btn">Send Reset Link</button>
      </form>
      <div class="auth-footer">Go to login page <a href="login.html">Login</a></div>
    </div>
    <div>
      <img class="auth-visual-img" src="assets/img/misc/auth-illustration.jpg" alt="Reset"
        onerror="this.src='https://placehold.co/400x380/c8b8f5/6C3AFF?text=Reset+Password'">
    </div>
  </div>
</div>
<div id="cta-placeholder"></div>
<div id="footer-placeholder"></div>
<script src="data/data.js"></script><script src="js/main.js"></script>
<script>
function handleReset(e){
  e.preventDefault();
  const btn=document.getElementById('fp-btn');
  btn.textContent='Sending...'; btn.disabled=true;
  setTimeout(()=>{btn.textContent='✓ Reset Link Sent!';setTimeout(()=>{btn.textContent='Send Reset Link';btn.disabled=false;document.getElementById('fp-email').value='';},3000);},1000);
}
</script>
</body>
</html>
