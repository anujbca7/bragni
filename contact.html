<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Contact Us — Inflanar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<div id="page-hero-placeholder"></div>
<div class="container" style="padding-bottom:80px">
  <div class="contact-layout" id="contact-layout"></div>
</div>
<div id="cta-placeholder"></div>
<div id="footer-placeholder"></div>
<script src="data/data.js"></script><script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  renderPageHero('Contact Us',[{label:'Home',href:'index.html'},{label:'Contact Us',href:'#'}]);
  const c=INFLANAR.contact;
  document.getElementById('contact-layout').innerHTML=`
    <div class="contact-info-card reveal-left">
      <div class="contact-info-title">Contact Info</div>
      <div class="contact-info-sub">Our Contact Info and we will respond as soon as possible</div>
      <div class="contact-info-item">
        <div class="contact-icon">📞</div>
        <div class="contact-info-vals">${c.phone.join('<br>')}</div>
      </div>
      <div class="contact-info-item">
        <div class="contact-icon">✉️</div>
        <div class="contact-info-vals">${c.email.join('<br>')}</div>
      </div>
      <div class="contact-info-item">
        <div class="contact-icon">📍</div>
        <div class="contact-info-vals">${c.address}</div>
      </div>
    </div>
    <div class="contact-form-card reveal-right">
      <div class="contact-form-title">Feel Free to Get in Touch</div>
      <form onsubmit="handleContact(event)">
        <div class="c-form-field"><label class="c-form-label">Name*</label><input type="text" class="c-form-input" placeholder="Name" required></div>
        <div class="c-form-field"><label class="c-form-label">Phone</label><input type="tel" class="c-form-input" placeholder="Phone"></div>
        <div class="c-form-field"><label class="c-form-label">Email*</label><input type="email" class="c-form-input" placeholder="Email" required></div>
        <div class="c-form-field"><label class="c-form-label">Subject*</label><input type="text" class="c-form-input" placeholder="Subject" required></div>
        <div class="c-form-field"><label class="c-form-label">Message*</label><textarea class="c-form-textarea" placeholder="Write your message" required></textarea></div>
        <button type="submit" class="btn btn-pink" style="padding:12px 32px;font-size:14px" id="contact-btn">Send Message</button>
      </form>
    </div>`;
  setTimeout(initReveal,80);
});
function handleContact(e){
  e.preventDefault();
  const btn=document.getElementById('contact-btn');
  btn.textContent='Sending...'; btn.disabled=true;
  setTimeout(()=>{btn.textContent='✓ Message Sent!';setTimeout(()=>{btn.textContent='Send Message';btn.disabled=false;},3000);},1000);
}
</script>
</body>
</html>
