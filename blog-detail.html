<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Blog Detail — Inflanar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .blog-detail-layout{display:grid;grid-template-columns:1fr 300px;gap:32px;padding:36px 0 80px;align-items:start}
    .blog-article{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-xl);overflow:hidden}
    .blog-article-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--gray-100)}
    .blog-article-body{padding:28px}
    .blog-article-meta{display:flex;gap:16px;margin-bottom:14px;font-size:13px;color:var(--text-light)}
    .blog-article-meta .ma{color:var(--pink)}
    .blog-article-title{font-family:var(--ff-display);font-size:clamp(22px,3vw,30px);font-weight:700;color:var(--text-dark);margin-bottom:18px;line-height:1.3}
    .blog-article-content{font-size:14.5px;color:var(--text-mid);line-height:1.9}
    .blog-article-content p{margin-bottom:14px}
    .blog-tags-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:16px 0;border-top:1px solid var(--gray-200);border-bottom:1px solid var(--gray-200);margin:24px 0}
    .blog-tag-chip{font-size:12px;color:var(--purple);background:rgba(108,58,255,.08);padding:4px 12px;border-radius:var(--r-full);border:1px solid rgba(108,58,255,.2)}
    .share-btns{display:flex;gap:8px;align-items:center}
    .share-btn{width:30px;height:30px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--white);cursor:pointer;transition:var(--t);border:none}
    .share-btn:hover{transform:scale(1.1);background:var(--pink)}
    /* Author box */
    .author-box{display:flex;gap:16px;align-items:flex-start;background:var(--light-bg);border-radius:var(--r-lg);padding:20px;margin-bottom:28px}
    .author-avatar{width:60px;height:60px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--gray-200)}
    .author-name{font-family:var(--ff-display);font-size:17px;font-weight:700;color:var(--text-dark);margin-bottom:6px}
    .author-bio{font-size:13px;color:var(--text-light);line-height:1.65}
    .follow-btn{font-size:12px;font-weight:600;color:var(--purple);text-decoration:underline;cursor:pointer;white-space:nowrap}
    /* Comments */
    .comments-title{font-family:var(--ff-display);font-size:20px;font-weight:700;color:var(--text-dark);margin-bottom:18px}
    .comment-item{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--gray-200)}
    .comment-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .comment-name{font-size:14px;font-weight:700;color:var(--text-dark);margin-bottom:2px}
    .comment-date{font-size:11px;color:var(--pink);margin-bottom:6px}
    .comment-text{font-size:13.5px;color:var(--text-mid);line-height:1.7}
    /* Write comment */
    .write-comment{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-xl);padding:28px;margin-top:28px}
    .write-comment-title{font-family:var(--ff-display);font-size:20px;font-weight:700;color:var(--text-dark);margin-bottom:18px}
    @media(max-width:900px){.blog-detail-layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="navbar-placeholder"></div>
<div id="page-hero-placeholder"></div>
<div class="container">
  <div class="blog-detail-layout">
    <!-- MAIN -->
    <div>
      <div class="blog-article reveal">
        <img class="blog-article-img" id="b-img" src="" alt="">
        <div class="blog-article-body">
          <div class="blog-article-meta">
            <span class="ma">👤 By <span id="b-author"></span></span>
            <span>📅 <span id="b-date"></span></span>
          </div>
          <h1 class="blog-article-title" id="b-title"></h1>
          <div class="blog-article-content" id="b-content"></div>
          <div class="blog-tags-row">
            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
              <span style="font-size:13px;font-weight:600;color:var(--text-dark)">Tags:</span>
              <div id="b-tags"></div>
            </div>
            <div class="share-btns">
              <span style="font-size:13px;font-weight:600;color:var(--text-dark)">Share:</span>
              <button class="share-btn">f</button>
              <button class="share-btn">𝕏</button>
              <button class="share-btn">P</button>
              <button class="share-btn">📷</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Author -->
      <div class="author-box reveal">
        <img class="author-avatar" id="b-author-img" src="" alt=""
          onerror="this.src='https://placehold.co/60x60/c8b8f5/6C3AFF?text=A'">
        <div style="flex:1">
          <div style="display:flex;align-items:flex-start;justify-content:space-between">
            <div class="author-name" id="b-author-name"></div>
            <div class="follow-btn">Follow On</div>
          </div>
          <div class="author-bio" id="b-author-bio"></div>
        </div>
      </div>

      <!-- Comments -->
      <div class="reveal" id="comments-section">
        <div class="comments-title" id="comments-count"></div>
        <div id="comments-list"></div>
      </div>

      <!-- Write comment -->
      <div class="write-comment reveal">
        <div class="write-comment-title">Write Your Comment</div>
        <form onsubmit="submitComment(event)">
          <div style="margin-bottom:12px">
            <label class="c-form-label">Name*</label>
            <input type="text" class="c-form-input" id="c-name" placeholder="Name" required>
          </div>
          <div style="margin-bottom:12px">
            <label class="c-form-label">Email*</label>
            <input type="email" class="c-form-input" id="c-email" placeholder="Email" required>
          </div>
          <div style="margin-bottom:16px">
            <label class="c-form-label">Comment*</label>
            <textarea class="c-form-textarea" id="c-comment" placeholder="Write your comment" rows="4" required></textarea>
          </div>
          <button type="submit" class="btn btn-pink" style="padding:12px 28px;font-size:14px">Send Comment</button>
        </form>
      </div>
    </div>

    <!-- SIDEBAR -->
    <aside>
      <div class="sidebar-box">
        <div class="sidebar-title">Search</div>
        <div class="sidebar-search">
          <input type="text" placeholder="Search">
          <button class="sidebar-search-btn">🔍</button>
        </div>
      </div>
      <div class="sidebar-box">
        <div class="sidebar-title">Popular Post</div>
        <div id="sidebar-popular"></div>
      </div>
      <div class="sidebar-box">
        <div class="sidebar-title">Blog Categories</div>
        <div id="sidebar-cats"></div>
      </div>
    </aside>
  </div>
</div>
<div id="cta-placeholder"></div>
<div id="footer-placeholder"></div>
<script src="data/data.js"></script><script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const params=new URLSearchParams(location.search);
  const id=params.get('id')||'b002';
  const b=INFLANAR.blogs.find(x=>x.id===id)||INFLANAR.blog_detail;
  const bd=INFLANAR.blog_detail;
  document.title=`${bd.title} — Inflanar`;
  renderPageHero(bd.title,[{label:'Home',href:'index.html'},{label:'Blogs',href:'blogs.html'},{label:bd.title,href:'#'}]);
  document.getElementById('b-img').src=bd.img;
  document.getElementById('b-img').onerror=function(){this.src='https://placehold.co/700x394/F5F3FF/6C3AFF?text=Blog'};
  document.getElementById('b-author').textContent=bd.author;
  document.getElementById('b-date').textContent=bd.date;
  document.getElementById('b-title').textContent=bd.title;
  document.getElementById('b-content').innerHTML=bd.content;
  document.getElementById('b-tags').innerHTML=bd.tags.map(t=>`<span class="blog-tag-chip">${t}</span>`).join(' ');
  // Author
  document.getElementById('b-author-img').src=bd.author_bio.avatar;
  document.getElementById('b-author-name').textContent=bd.author_bio.name;
  document.getElementById('b-author-bio').textContent=bd.author_bio.bio;
  // Comments
  document.getElementById('comments-count').textContent=`${bd.comments.length} Comments`;
  document.getElementById('comments-list').innerHTML=bd.comments.map(c=>`
    <div class="comment-item">
      <div class="comment-avatar">👤</div>
      <div>
        <div class="comment-name">${c.name}</div>
        <div class="comment-date">${c.date}</div>
        <div class="comment-text">${c.text}</div>
      </div>
    </div>`).join('');
  // Sidebar
  document.getElementById('sidebar-popular').innerHTML=INFLANAR.blogs.slice(0,4).map(bl=>`
    <a href="blog-detail.html?id=${bl.id}" class="popular-post-item">
      <img class="popular-post-img" src="${bl.img}" alt="${bl.title}"
        onerror="this.src='https://placehold.co/52x44/F5F3FF/6C3AFF?text=B'">
      <div>
        <div class="popular-post-title">${bl.title}</div>
        <div class="popular-post-date">📅 ${bl.date}</div>
      </div>
    </a>`).join('');
  document.getElementById('sidebar-cats').innerHTML=bd.blog_categories.map(c=>`
    <div class="sidebar-cat-item">${c.name}<span class="sidebar-cat-count">(${c.count})</span></div>`).join('');
  setTimeout(initReveal,80);
});
function submitComment(e){
  e.preventDefault();
  const btn=e.target.querySelector('button[type=submit]');
  btn.textContent='Sending...'; btn.disabled=true;
  setTimeout(()=>{btn.textContent='✓ Comment Submitted';setTimeout(()=>{btn.textContent='Send Comment';btn.disabled=false;e.target.reset();},2000);},800);
}
</script>
</body>
</html>
